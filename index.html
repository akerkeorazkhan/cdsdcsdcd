<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Stats Preview Card</title>
</head>
<body class="bg-[#0a0c1b] flex items-center justify-center min-h-screen p-6">

  <div class="flex flex-col md:flex-row bg-[#1c1938] rounded-xl overflow-hidden max-w-[400px] md:max-w-[1000px] shadow-2xl">
    
    <div class="relative w-full md:w-1/2 h-[240px] md:h-auto order-1 md:order-2 bg-[#aa5cdb]">
      <img 
        src="image-header-mobile.jpg" 
        alt="Insights" 
        class="h-full w-full object-cover opacity-75 mix-blend-multiply"
      >
      </div>

    <div class="p-8 md:p-16 w-full md:w-1/2 text-white text-center md:text-left order-2 md:order-1">
      <h1 class="text-3xl md:text-4xl font-bold leading-tight mb-6">
        Get <span class="text-[#aa5cdb]">insights</span> that help your business grow.
      </h1>
      <p class="text-gray-400 text-sm md:text-base mb-10 leading-relaxed">
        Discover the benefits of data analytics and make better decisions 
        regarding revenue, customer experience, and overall efficiency.
      </p>

      <div class="flex flex-col md:flex-row justify-between gap-6 md:gap-0">
        <div class="flex flex-col">
          <p class="text-2xl font-bold">10k+</p>
          <p class="text-gray-400 uppercase text-[10px] tracking-widest mt-1">companies</p>
        </div>
        <div class="flex flex-col">
          <p class="text-2xl font-bold">314</p>
          <p class="text-gray-400 uppercase text-[10px] tracking-widest mt-1">templates</p>
        </div>
        <div class="flex flex-col">
          <p class="text-2xl font-bold">12M+</p>
          <p class="text-gray-400 uppercase text-[10px] tracking-widest mt-1">queries</p>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
